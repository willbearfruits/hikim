name: build-hikim

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  linux:
    # Build + test Linux on every push (and on demand via workflow_dispatch).
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: deps
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake libasound2-dev libjack-jackd2-dev \
            libfreetype-dev libx11-dev libxcomposite-dev libxcursor-dev libxext-dev \
            libxinerama-dev libxrandr-dev libxrender-dev libfontconfig1-dev \
            libcurl4-openssl-dev libgl1-mesa-dev xvfb
      - name: configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release
      - name: build
        run: cmake --build build -j4
      - name: test
        run: xvfb-run -a ./build/ruin_tests_artefacts/Release/ruin_tests
      - name: package
        run: |
          mkdir -p stage/HIKIM
          cp build/dawglitch_artefacts/Release/HIKIM stage/HIKIM/
          cp README.md LICENSE stage/HIKIM/ 2>/dev/null || true
          tar -C stage -czf HIKIM-linux-x86_64.tar.gz HIKIM
      - uses: actions/upload-artifact@v4
        with:
          name: HIKIM-linux-x86_64
          path: HIKIM-linux-x86_64.tar.gz

  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: configure
        run: cmake -B build
      - name: build
        run: cmake --build build --config Release -j4
      - name: test
        run: .\build\ruin_tests_artefacts\Release\ruin_tests.exe
      - name: bundle ffmpeg
        # decode-anything out of the box: ffmpeg.exe ships next to HIKIM.exe
        run: |
          # Pinned ffmpeg build — the BtbN "latest" tag 404s intermittently.
          $url = "https://github.com/GyanD/codexffmpeg/releases/download/7.1/ffmpeg-7.1-essentials_build.zip"
          Invoke-WebRequest -Uri $url -OutFile ffmpeg.zip
          Expand-Archive ffmpeg.zip -DestinationPath ffmpeg-x -Force
          $ff = Get-ChildItem ffmpeg-x -Recurse -Filter "ffmpeg.exe" | Select-Object -First 1
          Copy-Item $ff.FullName build\dawglitch_artefacts\Release\ffmpeg.exe
          $lic = Get-ChildItem ffmpeg-x -Recurse -Filter "LICENSE*" | Select-Object -First 1
          if ($lic) { Copy-Item $lic.FullName build\dawglitch_artefacts\Release\ffmpeg-LICENSE.txt }
          else { "FFmpeg build - https://www.gyan.dev/ffmpeg/builds/" | Out-File build\dawglitch_artefacts\Release\ffmpeg-LICENSE.txt }
      - name: portable zip
        run: Compress-Archive -Path build\dawglitch_artefacts\Release\HIKIM.exe, build\dawglitch_artefacts\Release\ffmpeg.exe, build\dawglitch_artefacts\Release\ffmpeg-LICENSE.txt, README.md, LICENSE -DestinationPath HIKIM-windows-portable.zip
      - name: installer
        run: '& "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" installer\hikim.iss'
      - uses: actions/upload-artifact@v4
        with:
          name: HIKIM-windows-portable
          path: HIKIM-windows-portable.zip
      - uses: actions/upload-artifact@v4
        with:
          name: HIKIM-windows-installer
          path: installer/Output/HIKIM-setup.exe
